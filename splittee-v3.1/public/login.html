<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Split Tee</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #1B4332 0%, #2D6A4F 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            max-width: 420px;
            width: 100%;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
        }
        .logo {
            text-align: center;
            font-size: 32px;
            margin-bottom: 8px;
        }
        .title {
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            color: #1B4332;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: #6B7280;
            margin-bottom: 32px;
        }
        .tabs {
            display: flex;
            margin-bottom: 24px;
            border-bottom: 2px solid #E5E7EB;
        }
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            color: #6B7280;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }
        .tab:hover { color: #1B4332; }
        .tab.active {
            color: #1B4332;
            border-bottom-color: #1B4332;
        }
        .form { display: none; }
        .form.active { display: block; }
        .form-group { margin-bottom: 20px; }
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 6px;
        }
        .form-input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #E5E7EB;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        .form-input:focus {
            outline: none;
            border-color: #1B4332;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #1B4332;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: #14532D; }
        .btn:disabled {
            background: #9CA3AF;
            cursor: not-allowed;
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: #9CA3AF;
            font-size: 14px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #E5E7EB;
        }
        .divider span { padding: 0 12px; }
        .magic-link-btn {
            background: white;
            color: #1B4332;
            border: 2px solid #1B4332;
        }
        .magic-link-btn:hover { background: #D8F3DC; }
        .error {
            background: #FEE2E2;
            color: #DC2626;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }
        .success {
            background: #D8F3DC;
            color: #166534;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }
        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #6B7280;
        }
        .footer a {
            color: #1B4332;
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">⛳</div>
        <h1 class="title">Split Tee</h1>
        <p class="subtitle">Course Partner Portal</p>

        <div class="tabs">
            <div class="tab active" data-form="login">Login</div>
            <div class="tab" data-form="register">Register</div>
        </div>

        <div class="error" id="error"></div>
        <div class="success" id="success"></div>

        <!-- Login Form -->
        <form id="login-form" class="form active">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" class="form-input" id="login-email" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-input" id="login-password" required>
            </div>
            <button type="submit" class="btn">Login</button>
            
            <div class="divider"><span>or</span></div>
            
            <button type="button" class="btn magic-link-btn" id="magic-link-btn">
                ✉️ Send Magic Link
            </button>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="form">
            <div class="form-group">
                <label class="form-label">Course Name</label>
                <input type="text" class="form-input" id="register-name" required>
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" class="form-input" id="register-email" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-input" id="register-password" minlength="8" required>
            </div>
            <button type="submit" class="btn">Create Account</button>
        </form>

        <div class="footer">
            Need help? <a href="mailto:support@splittee.com">Contact Support</a>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.form + '-form').classList.add('active');
                hideMessages();
            });
        });

        // Login
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();

            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            try {
                const res = await fetch(`${API_BASE}/api/v1/courses/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || 'Login failed');
                }

                localStorage.setItem('splittee_access_token', data.accessToken);
                localStorage.setItem('splittee_refresh_token', data.refreshToken);
                window.location.href = '/course-dashboard.html';

            } catch (error) {
                showError(error.message);
            }
        });

        // Register
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();

            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;

            try {
                const res = await fetch(`${API_BASE}/api/v1/courses/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || 'Registration failed');
                }

                showSuccess('Account created! Check your email for a login link.');

            } catch (error) {
                showError(error.message);
            }
        });

        // Magic link
        document.getElementById('magic-link-btn').addEventListener('click', async () => {
            const email = document.getElementById('login-email').value;
            
            if (!email) {
                showError('Please enter your email first');
                return;
            }

            hideMessages();

            try {
                const res = await fetch(`${API_BASE}/api/v1/courses/magic-link`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                showSuccess('If an account exists, we\'ve sent a login link to your email.');

            } catch (error) {
                showSuccess('If an account exists, we\'ve sent a login link to your email.');
            }
        });

        function showError(message) {
            const el = document.getElementById('error');
            el.textContent = message;
            el.style.display = 'block';
        }

        function showSuccess(message) {
            const el = document.getElementById('success');
            el.textContent = message;
            el.style.display = 'block';
        }

        function hideMessages() {
            document.getElementById('error').style.display = 'none';
            document.getElementById('success').style.display = 'none';
        }

        // Check for error in URL
        const params = new URLSearchParams(window.location.search);
        if (params.get('error')) {
            showError(params.get('error').replace(/_/g, ' '));
        }
    </script>
</body>
</html>
